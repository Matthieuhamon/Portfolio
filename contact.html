<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <img class="logo" src="assets/img/logo.png" alt="Logo">
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="profil.html">Profil</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
        </nav>
    </header>
    <main>
        <div class="container">
            <h1 class="titre">CONTACTEZ-MOI</h1>
            <p class="sous-titre">N'hésitez pas à me contacter, je vous répondrai dans les plus brefs délais.</p>
            <div class="container-contact">
                <form class="container-contact">
                    <div class="form-1">
                        <div class="form-3">
                            <label for="fname">Prénom</label>
                            <input type="text" id="fname" name="fname" required>
                        </div>

                        <div class="form-3">
                            <label for="lname">Nom</label>
                            <input type="text" id="lname" name="lname">
                        </div>
                    </div>

                    <div class="form-1">
                        <div class="form-3">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div class="form-3">
                            <label for="tel">Téléphone</label>
                            <input type="tel" id="tel" name="tel" required>
                        </div>
                    </div>

                    <div class="form-1 form-2">
                        <label for="objet">Objet</label>
                        <input type="text" id="objet" name="objet" required>
                    </div>

                    <div class="form-1 form-2">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="4" required></textarea>
                    </div>

                    <input type="submit" class="envoyer" value="Envoyer">
                </form>
            </div>
        </div>
    </main>
</body>
</html>
